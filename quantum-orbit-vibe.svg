<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="12" fill="#0B0F14"/>

  <!-- orbit rings -->
  <ellipse cx="90" cy="90" rx="48" ry="22" fill="none" stroke="#23301E" stroke-width="1.2"/>
  <ellipse cx="90" cy="90" rx="48" ry="22" fill="none" stroke="#23301E" stroke-width="1.2" transform="rotate(60 90 90)"/>
  <ellipse cx="90" cy="90" rx="48" ry="22" fill="none" stroke="#23301E" stroke-width="1.2" transform="rotate(120 90 90)"/>

  <!-- nucleus -->
  <circle cx="90" cy="90" r="7" fill="#76B900">
    <animate attributeName="r" values="7;8.5;7" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- probability field -->
  <circle cx="90" cy="90" r="16" fill="none" stroke="#76B900" stroke-width="1" opacity="0.25">
    <animate attributeName="r" values="14;22;14" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- particle 1 -->
  <circle r="4.2" fill="#D9F99D">
    <animateMotion dur="3.2s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbit1"/>
    </animateMotion>
  </circle>

  <!-- particle 2 -->
  <circle r="3.6" fill="#A3E635" opacity="0.9">
    <animateMotion dur="2.4s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbit2"/>
    </animateMotion>
  </circle>

  <!-- hidden paths -->
  <path id="orbit1" d="M42 90 a48 22 0 1 1 96 0 a48 22 0 1 1 -96 0" fill="none"/>
  <path id="orbit2" d="M66 48 a48 22 60 1 1 48 84 a48 22 60 1 1 -48 -84" fill="none"/>

  <!-- collapse flicker -->
  <circle cx="122" cy="74" r="2.6" fill="#76B900" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="108" r="2.6" fill="#76B900" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0;0;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
