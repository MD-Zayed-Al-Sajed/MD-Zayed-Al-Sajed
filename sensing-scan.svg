<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="120" rx="12" fill="#0B0F14"/>

  <circle cx="60" cy="60" r="34" fill="none" stroke="#1F2A1A" stroke-width="1.2"/>
  <circle cx="60" cy="60" r="22" fill="none" stroke="#1F2A1A" stroke-width="1"/>
  <circle cx="60" cy="60" r="10" fill="none" stroke="#1F2A1A" stroke-width="1"/>

  <line x1="60" y1="60" x2="90" y2="60" stroke="#76B900" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="2.6s" repeatCount="indefinite"/>
  </line>

  <circle cx="79" cy="43" r="2.5" fill="#76B900">
    <animate attributeName="opacity" values="0;0;1;0;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="44" cy="78" r="2.5" fill="#A3E635">
    <animate attributeName="opacity" values="0;1;0;0;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="60" cy="60" r="3.5" fill="#D9F99D">
