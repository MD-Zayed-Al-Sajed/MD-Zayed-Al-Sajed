<svg width="900" height="230" viewBox="0 0 900 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="884" height="214" rx="22" fill="#060B14" stroke="#122033" stroke-width="2"/>

  <!-- icon glow -->
  <g filter="url(#greenGlow)">
    <rect x="34" y="34" width="48" height="48" rx="12" stroke="#76B900" stroke-width="3"/>
    <path d="M48 58H68" stroke="#76B900" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M58 48V68" stroke="#76B900" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  <!-- tiny signal dots -->
  <circle cx="842" cy="44" r="3.2" fill="#76B900" opacity="0.9">
    <animate attributeName="opacity" values="0.2;0.95;0.2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="826" cy="186" r="2.3" fill="#76B900" opacity="0.45">
    <animate attributeName="opacity" values="0.15;0.6;0.15" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- title -->
  <text x="126" y="62" fill="#E7EDF7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">
    Strategic Execution &amp; Delivery
  </text>

  <!-- divider -->
  <line x1="42" y1="104" x2="850" y2="104" stroke="#17314A" stroke-width="2"/>

  <!-- content -->
  <text x="58" y="144" fill="#D7DEE9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    Jira · Leadership · Cross-Functional Coordination
  </text>

  <text x="58" y="186" fill="#D7DEE9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    VS Code · Visual Studio · AI-Assisted Development · Delivery Workflow
  </text>
</svg>
