<svg width="420" height="176" viewBox="0 0 420 176" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow6" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="419" height="175" rx="10" fill="#0B0F14" stroke="#1E293B"/>

  <!-- icon -->
  <path d="M20 31V15L34 12V28" stroke="#76B900" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow6)"/>
  <circle cx="18" cy="33" r="4" stroke="#9FBF7A" stroke-width="1.6"/>
  <circle cx="32" cy="30" r="4" stroke="#9FBF7A" stroke-width="1.6"/>

  <!-- title -->
  <text x="62" y="27" fill="#D7E3F4" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">
    Audio, Art &amp; Game Engine
  </text>

  <!-- divider -->
  <line x1="20" y1="46.5" x2="400" y2="46.5" stroke="#1E293B"/>

  <!-- content -->
  <text x="28" y="68" fill="#C9D4E3" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">
    CGI / Blender · Substance Painter · 3D Prop Modeling
  </text>
  <text x="28" y="90" fill="#C9D4E3" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">
    PBR Texturing · UV Mapping · Animation &amp; Rigging
  </text>
  <text x="28" y="112" fill="#C9D4E3" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">
    Audio &amp; DAW (FL Studio) · Music Instruments Playing &amp; Live Setup
  </text>
  <text x="28" y="134" fill="#C9D4E3" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">
    Unity · Unreal Engine
  </text>

  <!-- subtle fireflies -->
  <circle cx="386" cy="18" r="1.6" fill="#76B900" opacity="0.8" filter="url(#softGlow6)">
    <animate attributeName="opacity" values="0.15;0.85;0.25;0.75;0.15" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="398" cy="28" r="1.2" fill="#9FBF7A" opacity="0.6" filter="url(#softGlow6)">
    <animate attributeName="opacity" values="0.1;0.7;0.2;0.55;0.1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="388" cy="150" r="1.4" fill="#C7F36B" opacity="0.55" filter="url(#softGlow6)">
    <animate attributeName="opacity" values="0.12;0.65;0.18;0.5;0.12" dur="3.0s" repeatCount="indefinite"/>
  </circle>
</svg>
