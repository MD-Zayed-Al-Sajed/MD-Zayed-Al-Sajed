<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="420" height="120" rx="10" fill="#0B0F14"/>

  <!-- faint network -->
  <g stroke="#1F2A1A" stroke-width="1.4" opacity="0.9">
    <line x1="40" y1="85" x2="95" y2="60"/>
    <line x1="95" y1="60" x2="145" y2="78"/>
    <line x1="145" y1="78" x2="200" y2="50"/>
    <line x1="200" y1="50" x2="260" y2="68"/>
    <line x1="260" y1="68" x2="320" y2="42"/>
    <line x1="320" y1="42" x2="375" y2="60"/>

    <line x1="95" y1="60" x2="140" y2="28"/>
    <line x1="140" y1="28" x2="200" y2="50"/>
    <line x1="145" y1="78" x2="210" y2="95"/>
    <line x1="210" y1="95" x2="260" y2="68"/>
    <line x1="260" y1="68" x2="300" y2="92"/>
    <line x1="300" y1="92" x2="375" y2="60"/>
  </g>

  <!-- active route -->
  <polyline
    points="40,85 95,60 145,78 200,50 260,68 320,42 375,60"
    fill="none"
    stroke="#76B900"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="8 8">
    <animate attributeName="stroke-dashoffset" values="0;-32" dur="1.6s" repeatCount="indefinite"/>
  </polyline>

  <!-- nodes -->
  <g fill="#2B3A24">
    <circle cx="40" cy="85" r="4"/>
    <circle cx="95" cy="60" r="4"/>
    <circle cx="145" cy="78" r="4"/>
    <circle cx="200" cy="50" r="4"/>
    <circle cx="260" cy="68" r="4"/>
    <circle cx="320" cy="42" r="4"/>
    <circle cx="375" cy="60" r="4"/>
    <circle cx="140" cy="28" r="4"/>
    <circle cx="210" cy="95" r="4"/>
    <circle cx="300" cy="92" r="4"/>
  </g>

  <!-- active node glow -->
  <g fill="#76B900">
    <circle cx="95" cy="60" r="4">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="50" r="4">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="42" r="4">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- moving agent -->
  <circle r="5" fill="#D9F99D">
    <animateMotion dur="3.6s" repeatCount="indefinite" rotate="auto">
      <mpath href="#routePath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- hidden motion path -->
  <path id="routePath" d="M40 85 L95 60 L145 78 L200 50 L260 68 L320 42 L375 60" fill="none"/>

  <!-- target pulse -->
  <g>
    <circle cx="375" cy="60" r="7" fill="none" stroke="#76B900" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="7;14;7" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="375" cy="60" r="4.5" fill="#76B900"/>
  </g>
</svg>
